<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Key Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      /* border: 1px solid blue; */
    }
    
    h1 {
      color: #000000;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    button {
      padding: 8px 15px;
      background-color: rgb(71, 79, 236);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: rgb(50, 70, 200);
    }

    #success-message {
      color: green;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>AI Summariser Settings</h1>

  <div class='form-group'>
    <label for="api-key">Gemini API Key:</label>
    <input type="text" id="api-key" placeholder="Enter your Gemini API key">

    <p>
      You can get an API key from
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.
    </p>

    <button id="save-btn">Save Settings</button>
    <p id="success-message">Settings saved successfully!</p>

    <script src="option.js"></script>
  </div>
</body>
</html>
