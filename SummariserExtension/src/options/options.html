<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Summariser Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="settings-shell">
    <section class="settings-panel">
      <div class="header-row">
        <div class="brand">
          <img src="../../assets/icons/icon-48.png" alt="" class="brand-icon">
          <div>
            <h1>AI Summariser Settings</h1>
            <p>Add providers, choose a default, and update saved model settings.</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="close-window-btn" class="secondary-button" type="button">Close window</button>
          <button id="new-btn" class="primary-button" type="button">New provider</button>
        </div>
      </div>

      <section class="provider-list-shell">
        <div class="section-heading">
          <h2>Providers</h2>
          <p>Default provider is expanded. Other providers stay collapsed until opened.</p>
        </div>
        <div id="provider-list" class="provider-list"></div>
      </section>

      <div id="auto-close-banner" class="auto-close-banner hidden" role="status">
        <span id="auto-close-message">Settings saved. Closing this window shortly.</span>
        <button id="cancel-auto-close-btn" class="secondary-button" type="button">Cancel auto-close</button>
      </div>

      <p id="status-message" class="status-message" role="status"></p>
    </section>
  </main>

  <section id="provider-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <h2 id="modal-title">Provider</h2>
          <p id="provider-help" class="help-text"></p>
        </div>
        <button id="close-modal-btn" class="icon-button" type="button" aria-label="Close provider editor">x</button>
      </div>

      <section class="provider-grid">
        <label class="field">
          <span>Provider type</span>
          <select id="provider-type"></select>
        </label>

        <label class="field" for="profile-name">
          <span>Display name</span>
          <input type="text" id="profile-name" placeholder="Gemini personal key">
        </label>
      </section>

      <section class="form-grid">
        <label class="field" for="model-name">
          <span>Model</span>
          <input type="text" id="model-name" placeholder="Model name">
        </label>

        <label class="field" for="base-url">
          <span>Base URL</span>
          <input type="text" id="base-url" placeholder="Provider API base URL">
        </label>
      </section>

      <label class="field" for="api-key">
        <span>API key</span>
        <div class="input-row">
          <input type="password" id="api-key" placeholder="Paste provider API key">
          <button id="toggle-key-btn" class="secondary-button" type="button">Show</button>
        </div>
      </label>

      <aside class="api-guide" aria-labelledby="api-guide-title">
        <div>
          <h3 id="api-guide-title">Get an API key</h3>
          <ol id="api-guide-steps"></ol>
        </div>
        <a id="api-guide-link" class="secondary-button api-guide-link" href="#" target="_blank" rel="noreferrer">Open key page</a>
      </aside>

      <label class="checkbox-field">
        <input type="checkbox" id="default-provider">
        <span>Use as default provider</span>
      </label>

      <div class="modal-actions">
        <button id="delete-btn" class="secondary-button danger-button" type="button">Delete</button>
        <div class="modal-actions-right">
          <button id="cancel-btn" class="secondary-button" type="button">Cancel</button>
          <button id="save-btn" class="primary-button" type="button">Save provider</button>
        </div>
      </div>
    </div>
  </section>

  <script src="../shared/providers.js"></script>
  <script src="options.js"></script>
</body>
</html>
