<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Summariser</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div class="brand">
        <img src="../../assets/icons/icon-48.png" alt="" class="brand-icon">
        <div>
          <h1>AI Summariser</h1>
          <p id="source-label">Ready to summarise this page</p>
        </div>
      </div>
      <button id="settings-btn" class="settings-button" type="button">Settings</button>
    </header>

    <section class="controls" aria-label="Source controls">
      <label class="field">
        <span>Source</span>
        <select id="source-type">
          <option value="page">Page / selected text</option>
          <option value="paste">Paste text</option>
          <option value="upload">Upload file</option>
        </select>
      </label>

      <label class="field">
        <span>Provider</span>
        <select id="provider-select"></select>
      </label>
    </section>

    <section id="paste-panel" class="input-panel hidden">
      <label class="field" for="paste-input">
        <span>Text to summarise</span>
        <textarea id="paste-input" placeholder="Paste text here..."></textarea>
      </label>
    </section>

    <section id="upload-panel" class="input-panel hidden">
      <label class="file-drop" for="file-input">
        <strong>Choose a text-based file</strong>
        <span>.txt, .md, .csv, .json, .html, text-based .pdf, .docx, and best-effort .doc files are supported now.</span>
      </label>
      <input id="file-input" type="file" accept=".txt,.md,.csv,.json,.html,.htm,.pdf,.doc,.docx,text/plain,text/markdown,text/csv,application/json,text/html,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
      <p id="file-label" class="file-label">No file selected</p>
    </section>

    <section class="controls" aria-label="Summary controls">
      <label class="field">
        <span>Output</span>
        <select id="output-mode">
          <option value="summary">Summary</option>
          <option value="links">Links only</option>
        </select>
      </label>

      <label class="field">
        <span>Style</span>
        <select id="summary-type">
          <option value="brief">Brief</option>
          <option value="detailed">Detailed</option>
          <option value="bullets">Bullets</option>
          <option value="takeaways">Key takeaways</option>
        </select>
      </label>

      <label class="field">
        <span>Content</span>
        <select id="content-type">
          <option value="auto" selected>Auto</option>
          <option value="article">Article</option>
          <option value="documentation">Documentation</option>
          <option value="tutorial">Tutorial</option>
          <option value="product">Product page</option>
          <option value="forum">Forum thread</option>
        </select>
      </label>

      <label class="field">
        <span>Length</span>
        <select id="summary-length">
          <option value="short">Short</option>
          <option value="medium" selected>Medium</option>
          <option value="long">Long</option>
        </select>
      </label>

      <label class="field">
        <span>Language</span>
        <select id="summary-language">
          <option value="same" selected>Same as source</option>
          <option value="english">English</option>
          <option value="hindi">Hindi</option>
          <option value="spanish">Spanish</option>
          <option value="french">French</option>
          <option value="german">German</option>
        </select>
      </label>
    </section>

    <details class="custom-prompt-panel">
      <summary>Custom instructions</summary>
      <label class="field" for="custom-prompt-input">
        <span>Prompt note</span>
        <textarea id="custom-prompt-input" placeholder="Example: focus on action items, risks, and next steps."></textarea>
      </label>
    </details>

    <section id="status" class="status" aria-live="polite">
      Choose a source, provider, and output mode.
    </section>

    <footer class="actions">
      <button id="summarise" class="primary-button" type="button">Run</button>
      <button id="copy-btn" class="secondary-button" type="button">Copy</button>
    </footer>

    <section class="export-actions" aria-label="Export output">
      <button id="copy-markdown-btn" class="secondary-button" type="button">Copy Markdown</button>
      <button id="save-output-btn" class="secondary-button" type="button">Save .txt</button>
    </section>

    <section id="result" class="result" aria-live="polite">
      <div class="empty-state">
        <strong>No output yet</strong>
        <span>Summarise a page, paste text, upload a text file, or extract links.</span>
      </div>
    </section>

    <section id="follow-up-panel" class="follow-up-panel hidden" aria-label="Ask about this source">
      <label class="field" for="follow-up-input">
        <span>Ask about this source</span>
        <textarea id="follow-up-input" placeholder="Ask a follow-up question about the summary..."></textarea>
      </label>
      <button id="follow-up-btn" class="secondary-button" type="button">Ask</button>
    </section>

    <section id="history-panel" class="history-panel hidden" aria-label="Recent outputs">
      <div class="history-header">
        <h2>Recent</h2>
        <button id="clear-history-btn" class="link-button" type="button">Clear</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </section>
  </main>

  <script src="../shared/prompts.js"></script>
  <script src="../shared/providers.js"></script>
  <script src="upload-readers.js"></script>
  <script src="history-store.js"></script>
  <script src="popup.js"></script>
</body>
</html>
